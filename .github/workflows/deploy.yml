name: Deploy

permissions:
  contents: write
  packages: write

on:
  push:
    tags:
      - '*.*.*'
    branches:
      - 'beta'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the target Git reference
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Cache Go modules and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            /home/runner/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Set up Golang
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT != '' && secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Prepare image names
        run: |
          echo "IMAGE_REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "IMAGE_TAG=$(echo '${{ github.ref_name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "DOCKERHUB_USER_LOWER=$(echo '${{ secrets.DOCKERHUB_USERNAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Image Tagging
        run: |
          # compute short sha for beta tagging
          SHORT_SHA=${GITHUB_SHA::6}

          # if this run is on the beta branch, tag as beta-{shortsha} and beta
          if [[ "${GITHUB_REF}" == "refs/heads/beta" ]]; then
            printf "ghcr.io/%s:beta-%s\n" "${IMAGE_REPO}" "${SHORT_SHA}" > /tmp/image-tags
            printf "ghcr.io/%s:beta\n" "${IMAGE_REPO}" >> /tmp/image-tags
            printf "docker.io/%s/dynacat:beta-%s\n" "${DOCKERHUB_USER_LOWER}" "${SHORT_SHA}" >> /tmp/image-tags
            printf "docker.io/%s/dynacat:beta\n" "${DOCKERHUB_USER_LOWER}" >> /tmp/image-tags

          # if this run is for a semver tag push, keep version (+ latest)
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            printf "ghcr.io/%s:%s\n" "${IMAGE_REPO}" "${IMAGE_TAG}" > /tmp/image-tags
            printf "docker.io/%s/dynacat:%s\n" "${DOCKERHUB_USER_LOWER}" "${IMAGE_TAG}" >> /tmp/image-tags
            printf "ghcr.io/%s:latest\n" "${IMAGE_REPO}" >> /tmp/image-tags
            printf "docker.io/%s/dynacat:latest\n" "${DOCKERHUB_USER_LOWER}" >> /tmp/image-tags

          # otherwise default to using the ref name as tag
          else
            printf "ghcr.io/%s:%s\n" "${IMAGE_REPO}" "${IMAGE_TAG}" > /tmp/image-tags
            printf "docker.io/%s/dynacat:%s\n" "${DOCKERHUB_USER_LOWER}" "${IMAGE_TAG}" >> /tmp/image-tags
          fi

          cat /tmp/image-tags
          echo "IMAGE_TAGS<<EOF" >> $GITHUB_ENV
          cat /tmp/image-tags >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Build and push Docker images
        env:
          IMAGE_TAGS_FILE: /tmp/image-tags
        run: |
          set -euo pipefail

          if [ ! -f /tmp/image-tags ]; then
            echo "Image tags file /tmp/image-tags not found"
            exit 1
          fi

          TAG_ARGS=$(awk '{printf "--tag %s ", $0}' /tmp/image-tags)

          ATTEMPTS=0
          MAX_ATTEMPTS=3

          until [ "$ATTEMPTS" -ge "$MAX_ATTEMPTS" ]; do
            ATTEMPTS=$((ATTEMPTS+1))
            echo "Build attempt $ATTEMPTS/$MAX_ATTEMPTS"

            if docker buildx build --push --platform linux/amd64,linux/arm64,linux/arm/v7 $TAG_ARGS --file ./Dockerfile .; then
              echo "Build and push succeeded"
              exit 0
            fi

            echo "Build attempt $ATTEMPTS failed"
            if [ "$ATTEMPTS" -lt "$MAX_ATTEMPTS" ]; then
              SLEEP_SECONDS=$((ATTEMPTS * 5))
              echo "Retrying after $SLEEP_SECONDS seconds..."
              sleep $SLEEP_SECONDS
            fi
          done

          echo "Build failed after $MAX_ATTEMPTS attempts"
          exit 1
