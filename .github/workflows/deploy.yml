name: Deploy

permissions:
  contents: write
  packages: write

on:
  push:
    tags:
      - '*.*.*'
    branches:
      - 'beta'
    paths-ignore:
      - 'docs/**'

jobs:
  deploy:
    runs-on: ubuntu-24.04
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Checkout the target Git reference
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Golang
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Lowercase repository and actor
        run: |
          echo "IMAGE_REPO=$(echo ${GITHUB_REPOSITORY} | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_ENV}"
          echo "ACTOR=$(echo ${GITHUB_ACTOR} | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_ENV}"
          echo "DOCKERHUB_USER_LOWER=$(echo '${{ env.DOCKERHUB_USERNAME }}' | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_ENV}"

      - name: Resolve app version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"
          elif [[ "${GITHUB_REF}" == "refs/heads/beta" ]]; then
            echo "APP_VERSION=beta-${GITHUB_SHA::7}" >> "${GITHUB_ENV}"
          else
            echo "APP_VERSION=dev" >> "${GITHUB_ENV}"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ env.ACTOR }}
          password: ${{ secrets.GHCR_PAT != '' && secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ env.IMAGE_REPO }}
            ${{ env.DOCKERHUB_USERNAME != '' && format('docker.io/{0}/dynacat', env.DOCKERHUB_USER_LOWER) || '' }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=beta-,enable=${{ github.ref == 'refs/heads/beta' }}
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check whether pushed tag is the latest tag
        id: latest_tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          latest_tag="$(git tag --sort=-version:refname | head -n 1)"
          echo "latest_tag=${latest_tag}" >> "${GITHUB_OUTPUT}"
          if [ "${GITHUB_REF_NAME}" = "${latest_tag}" ]; then
            echo "is_latest=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_latest=false" >> "${GITHUB_OUTPUT}"
          fi

  release-binaries:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: '386'
          - goos: linux
            goarch: arm
    steps:
      - name: Checkout the target Git reference
        uses: actions/checkout@v6

      - name: Set up Golang
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          APP_VERSION: ${{ github.ref_name }}
        run: go build -ldflags="-X github.com/Panonim/dynacat/internal/dynacat.buildVersion=${APP_VERSION}" -o dynacat .

      - name: Create tarball
        run: tar -czf dynacat-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz dynacat

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" dynacat-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz --clobber
