name: Sync Dynawidgets

permissions:
  contents: write

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch and sync widget list
        run: |
          README_URL="https://raw.githubusercontent.com/Panonim/dynawidgets/refs/heads/main/readme.md"
          DOCS_FILE="docs/docs/available-widgets.md"

          readme=$(curl -fsSL "$README_URL")

          generated=$(echo "$readme" | awk '/<!-- AUTO-GENERATED:START -->/{found=1; print; next} /<!-- AUTO-GENERATED:END -->/{print; found=0; next} found{print}')

          awk -v block="$generated" '
            /<!-- AUTO-GENERATED:START -->/ { print; in_block=1; print block; next }
            /<!-- AUTO-GENERATED:END -->/ { in_block=0 }
            !in_block { print }
          ' "$DOCS_FILE" > "$DOCS_FILE.tmp" && mv "$DOCS_FILE.tmp" "$DOCS_FILE"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/docs/available-widgets.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: sync available widgets from dynawidgets"
            git push
          fi
