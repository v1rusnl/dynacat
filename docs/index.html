<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynacat — Documentation</title>
  <script>
    (function () {
      try {
        var savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <link rel="icon" href="docs/logo.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="layout">
  <div class="overlay" id="overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-body">

      <div class="sidebar-header">
        <button class="site-logo" data-page="home">
          <img src="docs/logo.png" alt="Dynacat" class="logo-img">
          <div class="logo-text">
            <span class="logo-name">Dynacat</span>
            <span class="logo-sub">Documentation</span>
          </div>
        </button>
      </div>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 18 18" fill="none">
          <circle cx="7.5" cy="7.5" r="5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M11.5 11.5L15.5 15.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input
          type="search"
          id="search-input"
          class="search-input"
          placeholder="Search"
          autocomplete="off"
          spellcheck="false"
        >
      </div>

      <div class="search-results" id="search-results" hidden></div>

      <nav class="nav" id="nav">
        <!-- populated dynamically from docs/manifest.json -->
      </nav>
    </div>

    <div class="sidebar-footer">
      <a
        href="https://github.com/Panonim/dynacat"
        target="_blank"
        rel="noopener noreferrer"
        class="footer-link"
      >
        <svg viewBox="0 0 16 16" fill="currentColor" width="15" height="15" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
            0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
            -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
            .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
            -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
            .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
            .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
            0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8
            c0-4.42-3.58-8-8-8z"/>
        </svg>
        View on GitHub
      </a>

      <button id="theme-toggle" class="theme-toggle">
        <svg class="icon-sun" viewBox="0 0 16 16" fill="none" width="15" height="15" aria-hidden="true">
          <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.3"/>
          <path d="M8 1.5v1.5M8 13v1.5M1.5 8H3M13 8h1.5M3.6 3.6l1.1 1.1M11.3 11.3l1.1 1.1M3.6 12.4l1.1-1.1M11.3 4.7l1.1-1.1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 16 16" fill="none" width="15" height="15" aria-hidden="true">
          <path d="M13 10.5A6 6 0 0 1 5.5 3 6.5 6.5 0 1 0 13 10.5z" stroke="currentColor" stroke-width="1.3"/>
        </svg>
        <span id="theme-label">Light mode</span>
      </button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Toggle sidebar">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <span class="bc-root">Dynacat</span>
        <span class="bc-sep" aria-hidden="true">/</span>
        <span id="bc-page">Welcome</span>
      </nav>
    </header>

    <main class="page" id="content">
      <!-- content renders here -->
    </main>
  </div>

  <button class="go-to-top" id="go-to-top" aria-label="Go to top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
  </button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/dockerfile.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
