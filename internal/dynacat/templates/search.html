{{ template "widget-base.html" . }}

{{ define "widget-content-classes" }}widget-content-frameless{{ end }}

{{ define "widget-content" }}
<div class="search widget-content-frame padding-inline-widget flex gap-15 items-center" data-default-search-url="{{ .SearchEngine }}" data-new-tab="{{ .NewTab }}" data-target="{{ .Target }}"{{ if .Autocomplete }} data-autocomplete="true"{{ end }}>
    <div class="search-bangs">
        {{ range .Bangs }}
        <input type="hidden" data-shortcut="{{ .Shortcut }}" data-title="{{ .Title }}" data-url="{{ .URL }}"{{ if .Icon.URL }} data-icon="{{ .Icon.URL }}"{{ if .Icon.AutoInvert }} data-icon-auto-invert="true"{{ end }}{{ end }}>
        {{ end }}
    </div>

    <div class="search-icon-container">
        <svg class="search-icon" stroke="var(--color-text-subdue)" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
        </svg>
        <img class="search-bang-icon" src="" alt="" aria-hidden="true">
    </div>

    <form class="search-form" action="javascript:void(0)">
        <input class="search-input" type="text" placeholder="{{ .Placeholder }}" autocomplete="off" enterkeyhint="search"{{ if .Autofocus }} autofocus{{ end }}>
    </form>

    <div class="search-bang"></div>
    <kbd class="hide-on-mobile" title="Press [S] to focus the search input">S</kbd>
    {{ if .Autocomplete }}<div class="search-autocomplete" role="listbox" aria-label="Search suggestions"></div>{{ end }}
</div>
{{ end }}
