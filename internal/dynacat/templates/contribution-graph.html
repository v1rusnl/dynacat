{{ template "widget-base.html" . }}
{{ define "widget-content" }}
<div class="contribution-graph">
    <div class="contribution-graph-months">
        {{ range .MonthLabels }}
        <span style="left: {{ .PixelOffset }}px">{{ .Name }}</span>
        {{ end }}
    </div>
    <div class="contribution-graph-grid">
        {{ range .Weeks }}
        <div class="contribution-week">
            {{ range .Days }}
            <div class="contribution-day"
                 data-level="{{ .Level }}"
                 {{ if .Count }}
                 data-popover-type="text"
                 data-popover-text="{{ .Count }} contributions on {{ .Date }}"
                 {{ end }}>
            </div>
            {{ end }}
        </div>
        {{ end }}
    </div>
    <div class="contribution-graph-footer">
        <span class="color-text-subdue size-h6">{{ .TotalContributions | formatNumber }} contributions in the last year</span>
    </div>
</div>
{{ end }}
